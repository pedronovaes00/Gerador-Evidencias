<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Evidências de Teste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/custom.css">
    <link rel="stylesheet" href="static/css/fab.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8">Gerador de Evidências de Teste</h1>
        
        <div id="testerInfoSection" class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Informações do Testador</h2>
            
            <form id="testerInfoForm" class="space-y-4">
                <!-- 1. Identificação -->
                <div class="border-b border-gray-200 pb-4 mb-4">
                    <h3 class="text-lg font-medium mb-2">1. Identificação</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="originId" class="block text-sm font-medium text-gray-700">ID(s) da Origem</label>
                            <input type="text" id="originId" name="originId" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="originDescription" class="block text-sm font-medium text-gray-700">Nome/Breve Descrição da Origem</label>
                            <input type="text" id="originDescription" name="originDescription" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                    </div>
                </div>
                
                <!-- 2. Identificação do Teste -->
                <div class="border-b border-gray-200 pb-4 mb-4">
                    <h3 class="text-lg font-medium mb-2">2. Identificação do Teste</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label for="testType" class="block text-sm font-medium text-gray-700">Tipo de Teste</label>
                            <input type="text" id="testType" name="testType" value="Funcional" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="systems" class="block text-sm font-medium text-gray-700">Sistema(s)</label>
                            <input type="text" id="systems" name="systems" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="environment" class="block text-sm font-medium text-gray-700">Ambiente</label>
                            <input type="text" id="environment" name="environment" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                    </div>
                </div>
                
                <!-- 3. Envolvidos -->
                <div class="border-b border-gray-200 pb-4 mb-4">
                    <h3 class="text-lg font-medium mb-2">3. Envolvidos</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="testerName" class="block text-sm font-medium text-gray-700">Nome Completo</label>
                            <input type="text" id="testerName" name="testerName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="role" class="block text-sm font-medium text-gray-700">Papel</label>
                            <input type="text" id="role" name="role" value="QA" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="company" class="block text-sm font-medium text-gray-700">Empresa/Área</label>
                            <input type="text" id="company" name="company" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
                            <input type="email" id="email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        </div>
                    </div>
                </div>
                
                <!-- 4. Sumário -->
                <div>
                    <h3 class="text-lg font-medium mb-2">4. Sumário</h3>
                    <div>
                        <label for="summary" class="block text-sm font-medium text-gray-700">Breve descrição do que está testando</label>
                        <textarea id="summary" name="summary" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
                    </div>
                </div>
                
                <button type="submit" class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    Salvar Informações do Testador
                </button>
            </form>
        </div>
        
        <div id="testExecutionSection" class="bg-white rounded-lg shadow-md p-6 mb-8" style="display: none;">
            <h2 class="text-xl font-semibold mb-4">Cadastrar Nova Execução de Teste</h2>
            
            <form id="testForm" class="space-y-4">
                <div>
                    <label for="testId" class="block text-sm font-medium text-gray-700">ID do Caso de Teste</label>
                    <input type="text" id="testId" name="testId" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                </div>
                
                <div>
                    <label for="testDescription" class="block text-sm font-medium text-gray-700">Descrição</label>
                    <textarea id="testDescription" name="testDescription" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
                </div>
                
                <div>
                    <label for="testPreconditions" class="block text-sm font-medium text-gray-700">Pré-Condições</label>
                    <textarea id="testPreconditions" name="testPreconditions" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
                </div>
                
                <div>
                    <label for="testEvidence" class="block text-sm font-medium text-gray-700">Evidências - Selecione um ou mais arquivos (imagens, documentos, vídeos, etc.)</label>
                    <input type="file" id="testEvidence" name="testEvidence" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip,.rar,.7z" multiple class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    <div id="selectedFiles" class="mt-2 text-sm text-gray-500"></div>
                </div>
                
                <div class="border-t border-gray-200 pt-4 mt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status da Execução</label>
                    <div class="flex space-x-4">
                        <div class="flex items-center">
                            <input type="radio" id="statusSuccess" name="status" value="success" checked class="h-4 w-4 text-indigo-600 focus:ring-indigo-500">
                            <label for="statusSuccess" class="ml-2 block text-sm text-gray-700">Sucesso</label>
                        </div>
                        <div class="flex items-center">
                            <input type="radio" id="statusError" name="status" value="error" class="h-4 w-4 text-red-600 focus:ring-red-500">
                            <label for="statusError" class="ml-2 block text-sm text-gray-700">Erro</label>
                        </div>
                    </div>
                </div>
                
                <div id="errorDescriptionContainer" class="hidden">
                    <label for="errorDescription" class="block text-sm font-medium text-gray-700">Descrição do Erro</label>
                    <textarea id="errorDescription" name="errorDescription" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
                </div>
                
                <div id="errorCorrectionContainer" class="hidden">
                    <label for="errorCorrection" class="block text-sm font-medium text-gray-700">Correção do Defeito</label>
                    <textarea id="errorCorrection" name="errorCorrection" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
                </div>
                

                
                <div class="flex space-x-2">
                    <button type="submit" class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                        Salvar Execução
                    </button>
                    <button type="button" id="deleteAllTestsBtn" class="inline-flex justify-center rounded-md border border-transparent bg-red-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
                        Excluir Todas Execuções
                    </button>
                </div>
            </form>
        </div>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Execuções Registradas</h2>
            <div id="testExecutions" class="space-y-4">
                <!-- As execuções serão carregadas aqui via JavaScript -->
            </div>
            
            <button id="generatePdf" class="mt-4 inline-flex justify-center rounded-md border border-transparent bg-green-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
                Gerar Documento PDF
            </button>
        </div>
        
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">Testes Executados</h2>
                <div class="flex items-center space-x-2">
                    <button id="selectAllPdfs" class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                        <i class="fas fa-check-square mr-2"></i>
                        Selecionar Todos
                    </button>
                    <button id="downloadSelectedPdfs" class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        <i class="fas fa-download mr-2"></i>
                        Baixar Selecionados
                    </button>
                    <button id="deleteSelectedPdfs" class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        <i class="fas fa-trash mr-2"></i>
                        Excluir Selecionados
                    </button>
                </div>
            </div>
            <div id="pdfList" class="space-y-4 overflow-x-auto">
                <!-- Os PDFs serão carregados aqui via JavaScript -->
                <p class="text-gray-500">Carregando PDFs disponíveis...</p>
            </div>
        </div>
    </div>
    
    <!-- Botão de Ação Flutuante (FAB) -->
    <div class="fab-container">
        <div class="fab-button">
            <i class="fas fa-plus"></i>
        </div>
        <div class="fab-options">
            <div class="fab-option">
                <div class="fab-option-label">Gerador de DOCJOBS BRM</div>
                <div class="fab-option-button" id="fab-docjobs-generator">
                    <i class="fas fa-file-alt"></i>
                </div>
            </div>
            <div class="fab-option">
                <div class="fab-option-label">Gerador de Evidências de Testes</div>
                <div class="fab-option-button" id="fab-evidence-generator">
                    <i class="fas fa-clipboard-check"></i>
                </div>
            </div>
        </div>
    </div>
    
    <script src="static/js/main.js"></script>
    <script src="static/js/fab.js"></script>
</body>
</html>
