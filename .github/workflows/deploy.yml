name: CI/CD - Gerador de Evidencias
on:
  push:
    branches: [main]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gerador-evidencias:latest
            ${{ secrets.DOCKER_USERNAME }}/gerador-evidencias:${{ github.sha }}
      - name: Notificar e Referenciar local da falha
        if: failure()
        run: echo "❌ Pipe falhou!" - Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
